<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Management - EduPulse</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .header {
        background: #2c3e50;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .header p {
        opacity: 0.9;
        font-size: 1.1rem;
      }

      .content {
        padding: 30px;
      }

      .section {
        margin-bottom: 40px;
      }

      .section h2 {
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 1.8rem;
        border-bottom: 3px solid #3498db;
        padding-bottom: 10px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-weight: 600;
        margin-bottom: 5px;
        color: #34495e;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        padding: 12px;
        border: 2px solid #ecf0f1;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .btn-primary {
        background: #3498db;
        color: white;
      }

      .btn-primary:hover {
        background: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
      }

      .btn-success {
        background: #27ae60;
        color: white;
      }

      .btn-success:hover {
        background: #229954;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
      }

      .btn-danger {
        background: #e74c3c;
        color: white;
      }

      .btn-danger:hover {
        background: #c0392b;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
      }

      .btn-warning {
        background: #f39c12;
        color: white;
      }

      .btn-warning:hover {
        background: #e67e22;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
      }

      .teacher-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
      }

      .teacher-card {
        background: #f8f9fa;
        border-radius: 12px;
        padding: 20px;
        border: 2px solid #ecf0f1;
        transition: all 0.3s ease;
      }

      .teacher-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-color: #3498db;
      }

      .teacher-name {
        font-size: 1.3rem;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 10px;
      }

      .teacher-info {
        margin-bottom: 8px;
        color: #7f8c8d;
      }

      .teacher-info strong {
        color: #34495e;
      }

      .teacher-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .teacher-actions .btn {
        flex: 1;
        padding: 8px 12px;
        font-size: 0.9rem;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal.show {
        display: flex;
      }

      .modal-content {
        background: white;
        border-radius: 12px;
        padding: 30px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .modal-header h3 {
        color: #2c3e50;
        font-size: 1.5rem;
      }

      .close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #7f8c8d;
      }

      .close-btn:hover {
        color: #e74c3c;
      }

      .alert {
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        .content {
          padding: 20px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .teacher-list {
          grid-template-columns: 1fr;
        }

        .teacher-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Teacher Management</h1>
        <p>EduPulse School Management System</p>
      </div>

      <div class="content">
        <div class="section">
          <h2>Create New Teacher</h2>
          <div class="alert alert-success" id="successAlert"></div>
          <div class="alert alert-error" id="errorAlert"></div>

          <form id="createTeacherForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required />
              </div>
              <div class="form-group">
                <label for="school_name">School Name *</label>
                <input
                  type="text"
                  id="school_name"
                  name="school_name"
                  required
                />
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" />
              </div>
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                  <option value="">Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                </select>
              </div>
              <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role">
                  <option value="teacher">Teacher</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div class="form-group">
                <label for="qualification">Qualification</label>
                <input type="text" id="qualification" name="qualification" />
              </div>
              <div class="form-group">
                <label for="experience">Experience</label>
                <input
                  type="text"
                  id="experience"
                  name="experience"
                  placeholder="e.g., 5 years"
                />
              </div>
              <div class="form-group">
                <label for="subjects">Subjects (comma-separated)</label>
                <input
                  type="text"
                  id="subjects"
                  name="subjects"
                  placeholder="Math, Science, English"
                />
              </div>
              <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="address">Address</label>
              <textarea id="address" name="address" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="createBtn">
              <span class="btn-text">Create Teacher</span>
              <span
                class="loading"
                id="createLoading"
                style="display: none"
              ></span>
            </button>
          </form>
        </div>

        <div class="section">
          <h2>Teachers List</h2>
          <div class="form-group" style="margin-bottom: 20px">
            <label for="schoolFilter">Filter by School</label>
            <input
              type="text"
              id="schoolFilter"
              placeholder="Enter school name"
            />
            <button class="btn btn-success" onclick="loadTeachers()">
              Load Teachers
            </button>
          </div>
          <div id="teachersList" class="teacher-list">
            <!-- Teachers will be loaded here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Teacher Modal -->
    <div class="modal" id="editModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit Teacher</h3>
          <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <form id="editTeacherForm">
          <input type="hidden" id="editTeacherId" name="id" />
          <div class="form-grid">
            <div class="form-group">
              <label for="editName">Full Name</label>
              <input type="text" id="editName" name="name" />
            </div>
            <div class="form-group">
              <label for="editEmail">Email</label>
              <input type="email" id="editEmail" name="email" />
            </div>
            <div class="form-group">
              <label for="editPhone">Phone</label>
              <input type="tel" id="editPhone" name="phone" />
            </div>
            <div class="form-group">
              <label for="editGender">Gender</label>
              <select id="editGender" name="gender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
            <div class="form-group">
              <label for="editQualification">Qualification</label>
              <input type="text" id="editQualification" name="qualification" />
            </div>
            <div class="form-group">
              <label for="editExperience">Experience</label>
              <input type="text" id="editExperience" name="experience" />
            </div>
            <div class="form-group">
              <label for="editSubjects">Subjects</label>
              <input type="text" id="editSubjects" name="subjects" />
            </div>
            <div class="form-group">
              <label for="editStatus">Status</label>
              <select id="editStatus" name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="editAddress">Address</label>
            <textarea id="editAddress" name="address" rows="3"></textarea>
          </div>
          <div style="display: flex; gap: 10px">
            <button type="submit" class="btn btn-primary">
              Update Teacher
            </button>
            <button type="button" class="btn btn-danger" onclick="closeModal()">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:5000/api";

      // Utility functions
      function showAlert(message, type = "success") {
        const alertEl = document.getElementById(
          type === "success" ? "successAlert" : "errorAlert",
        );
        alertEl.textContent = message;
        alertEl.style.display = "block";
        setTimeout(() => {
          alertEl.style.display = "none";
        }, 5000);
      }

      function setLoading(buttonId, loadingId, loading = true) {
        const btn = document.getElementById(buttonId);
        const loadingEl = document.getElementById(loadingId);
        const btnText = btn.querySelector(".btn-text");

        if (loading) {
          btn.disabled = true;
          if (btnText) btnText.style.display = "none";
          loadingEl.style.display = "inline-block";
        } else {
          btn.disabled = false;
          if (btnText) btnText.style.display = "inline";
          loadingEl.style.display = "none";
        }
      }

      function formatDisplayName(name) {
        if (!name) return name;
        return name
          .split(" ")
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      // Create Teacher
      document
        .getElementById("createTeacherForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);
          const teacherData = Object.fromEntries(formData);

          // Convert subjects string to array
          if (teacherData.subjects) {
            teacherData.subjects = teacherData.subjects
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean);
          }

          setLoading("createBtn", "createLoading", true);

          try {
            const response = await fetch(`${API_BASE}/teachers`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(teacherData),
            });

            const result = await response.json();

            if (response.ok) {
              showAlert("Teacher created successfully!");
              e.target.reset();
              loadTeachers();
            } else {
              showAlert(result.error || "Failed to create teacher", "error");
            }
          } catch (error) {
            showAlert("Network error occurred", "error");
          } finally {
            setLoading("createBtn", "createLoading", false);
          }
        });

      // Load Teachers
      async function loadTeachers() {
        const schoolName = document.getElementById("schoolFilter").value.trim();
        if (!schoolName) {
          showAlert("Please enter a school name to load teachers", "error");
          return;
        }

        try {
          const teachersResponse = await fetch(
            `${API_BASE}/teachers/school/${encodeURIComponent(schoolName)}`,
          );
          const teachersData = await teachersResponse.json();

          if (teachersResponse.ok) {
            displayTeachers(teachersData.teachers);
          } else {
            showAlert(teachersData.error || "Failed to load teachers", "error");
          }
        } catch (error) {
          showAlert("Network error occurred", "error");
        }
      }

      function displayTeachers(teachers) {
        const container = document.getElementById("teachersList");
        container.innerHTML = "";

        if (!teachers || teachers.length === 0) {
          container.innerHTML =
            '<p style="text-align: center; color: #7f8c8d; font-style: italic;">No teachers found</p>';
          return;
        }

        teachers.forEach((teacher) => {
          const card = document.createElement("div");
          card.className = "teacher-card";

          const subjects =
            teacher.subjects && teacher.subjects.length > 0
              ? teacher.subjects.join(", ")
              : "No subjects assigned";

          card.innerHTML = `
                    <div class="teacher-name">${formatDisplayName(teacher.name)}</div>
                    <div class="teacher-info"><strong>Email:</strong> ${teacher.email}</div>
                    <div class="teacher-info"><strong>Phone:</strong> ${teacher.phone || "N/A"}</div>
                    <div class="teacher-info"><strong>Role:</strong> ${teacher.role || "teacher"}</div>
                    <div class="teacher-info"><strong>Status:</strong> ${teacher.status || "active"}</div>
                    <div class="teacher-info"><strong>Subjects:</strong> ${subjects}</div>
                    <div class="teacher-info"><strong>Qualification:</strong> ${teacher.qualification || "N/A"}</div>
                    <div class="teacher-info"><strong>Experience:</strong> ${teacher.experience || "N/A"}</div>
                    <div class="teacher-actions">
                        <button class="btn btn-warning" onclick="editTeacher('${teacher._id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteTeacher('${teacher._id}')">Delete</button>
                        <button class="btn btn-success" onclick="assignRole('${teacher._id}', '${teacher.role === "admin" ? "teacher" : "admin"}')">
                            Make ${teacher.role === "admin" ? "Teacher" : "Admin"}
                        </button>
                    </div>
                `;

          container.appendChild(card);
        });
      }

      // Edit Teacher
      function editTeacher(teacherId) {
        // This would require fetching individual teacher data
        // For now, we'll open the modal with basic edit functionality
        document.getElementById("editTeacherId").value = teacherId;
        document.getElementById("editModal").classList.add("show");
      }

      function closeModal() {
        document.getElementById("editModal").classList.remove("show");
      }

      // Delete Teacher
      async function deleteTeacher(teacherId) {
        if (!confirm("Are you sure you want to delete this teacher?")) return;

        try {
          const response = await fetch(`${API_BASE}/teachers/${teacherId}`, {
            method: "DELETE",
          });

          if (response.ok) {
            showAlert("Teacher deleted successfully!");
            loadTeachers();
          } else {
            showAlert("Failed to delete teacher", "error");
          }
        } catch (error) {
          showAlert("Network error occurred", "error");
        }
      }

      // Assign Role
      async function assignRole(teacherId, newRole) {
        try {
          const response = await fetch(
            `${API_BASE}/teachers/${teacherId}/role`,
            {
              method: "PATCH",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ role: newRole }),
            },
          );

          if (response.ok) {
            showAlert(`Teacher role updated to ${newRole}!`);
            loadTeachers();
          } else {
            showAlert("Failed to update role", "error");
          }
        } catch (error) {
          showAlert("Network error occurred", "error");
        }
      }

      // Edit form submission
      document
        .getElementById("editTeacherForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);
          const teacherData = Object.fromEntries(formData);
          const teacherId = teacherData.id;

          // Convert subjects string to array
          if (teacherData.subjects) {
            teacherData.subjects = teacherData.subjects
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean);
          }

          try {
            const response = await fetch(`${API_BASE}/teachers/${teacherId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(teacherData),
            });

            if (response.ok) {
              showAlert("Teacher updated successfully!");
              closeModal();
              loadTeachers();
            } else {
              showAlert("Failed to update teacher", "error");
            }
          } catch (error) {
            showAlert("Network error occurred", "error");
          }
        });

      // Close modal when clicking outside
      document.getElementById("editModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("editModal")) {
          closeModal();
        }
      });
    </script>
  </body>
</html>
